global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "mcp-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["gateway:9090"]
        labels:
          service: "mcp-gateway"
          environment: "development"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
